<!-- Background floaters -->
<div class="floaters" id="floaters"></div>

<main>
<div class="header">

let unlocked = new Set();

function puzzleIcon(color, size=52) {
  const d = size, h = d/2, b = d*0.2, nd = d*0.15, nw = d*0.12;
  return `<svg width="${d}" height="${d}" viewBox="0 0 ${d} ${d}" fill="none">
    <path d="M${b},${b} L${h-nw},${b} C${h-nw},${b} ${h-nw},${b-nd} ${h},${b-nd} C${h+nw},${b-nd} ${h+nw},${b} ${h+nw},${b} L${d-b},${b} L${d-b},${h-nw} C${d-b},${h-nw} ${d-b+nd},${h-nw} ${d-b+nd},${h} C${d-b+nd},${h+nw} ${d-b},${h+nw} ${d-b},${h+nw} L${d-b},${d-b} L${h+nw},${d-b} C${h+nw},${d-b} ${h+nw},${d-b+nd} ${h},${d-b+nd} C${h-nw},${d-b+nd} ${h-nw},${d-b} ${h-nw},${d-b} L${b},${d-b} L${b},${h+nw} C${b},${h+nw} ${b-nd},${h+nw} ${b-nd},${h} C${b-nd},${h-nw} ${b},${h-nw} ${b},${h-nw} Z"
    fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderPieces() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  PIECES.forEach((p, i) => {
    const isUnlocked = unlocked.has(p.id);
    const isLocked   = p.unlockAfter > 0 && !unlocked.has(p.unlockAfter);

    const el = document.createElement('div');
    el.className = 'piece' + (isUnlocked ? ' piece--done' : '') + (isLocked ? ' piece--locked' : '');
    el.style.setProperty('--piece-color', p.color);
    el.style.setProperty('--piece-glow', p.glow);
    el.dataset.id = p.id;
    el.dataset.idx = i;

    el.innerHTML = `
      <div class="piece__stripe"></div>
      <div class="piece__front">
        <div class="piece__icon">${p.icon}</div>
        <div class="piece__number">${p.number}</div>
        <div class="piece__question">${p.question}</div>
        <div class="piece__hint">${p.hint}</div>
        ${isLocked
          ? `<div class="piece__hint" style="color:${p.color};margin-top:0.5rem"> Ontgrendel stukje ${p.unlockAfter} eerst</div>`
          : `<div class="piece__tap"> Tik om te ontdekken</div>`
        }
      </div>
      <div class="piece__back">
        <div class="piece__label">${p.label}</div>
        <div class="piece__title">${p.title}</div>
        <div class="piece__explain">${p.explain}</div>
        <div class="piece__example">${p.example}</div>
        <div class="piece__tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    `;

    if (!isLocked && !isUnlocked) {
      el.addEventListener('click', () => unlock(p.id));
    }

    board.appendChild(el);
  });

  // Apply puzzle clip-paths after DOM is painted
  requestAnimationFrame(() => requestAnimationFrame(applyPuzzleShapes));
}

// ─── PUZZLE CLIP-PATH SHAPES ───────────────────────────────────────────────
// 3×2 grid nub directions [top, right, bottom, left] — 'f'=flat, 'o'=tab-out, 'i'=socket-in
const PIECE_NUBS = [
  ['f','o','o','f'],  // 1: top-left
  ['f','o','o','i'],  // 2: top-center
  ['f','f','o','i'],  // 3: top-right
  ['i','o','f','f'],  // 4: bottom-left
  ['i','o','f','i'],  // 5: bottom-center
  ['i','f','f','i'],  // 6: bottom-right
];

function buildPath(W, H, nubs) {
  const D  = Math.round(Math.min(W, H) * 0.09); // nub depth (~9%)
  const NW = Math.round(Math.min(W, H) * 0.13); // nub half-width (~13%)
  const CX = Math.round(W / 2);
  const CY = Math.round(H / 2);
  const [top, right, bot, left] = nubs;

  // helpers
  const topEdge = () => {
    if (top === 'f') return `L ${W} 0 `;
    if (top === 'o') return `L ${CX-NW} 0 C ${CX-NW} ${-D} ${CX+NW} ${-D} ${CX+NW} 0 L ${W} 0 `;
    return               `L ${CX-NW} 0 C ${CX-NW} ${D}  ${CX+NW} ${D}  ${CX+NW} 0 L ${W} 0 `;
  };
  const rightEdge = () => {
    if (right === 'f') return `L ${W} ${H} `;
    if (right === 'o') return `L ${W} ${CY-NW} C ${W+D} ${CY-NW} ${W+D} ${CY+NW} ${W} ${CY+NW} L ${W} ${H} `;
    return                    `L ${W} ${CY-NW} C ${W-D} ${CY-NW} ${W-D} ${CY+NW} ${W} ${CY+NW} L ${W} ${H} `;
  };
  const botEdge = () => {
    if (bot === 'f') return `L 0 ${H} `;
    if (bot === 'o') return `L ${CX+NW} ${H} C ${CX+NW} ${H+D} ${CX-NW} ${H+D} ${CX-NW} ${H} L 0 ${H} `;
    return                  `L ${CX+NW} ${H} C ${CX+NW} ${H-D} ${CX-NW} ${H-D} ${CX-NW} ${H} L 0 ${H} `;
  };
  const leftEdge = () => {
    if (left === 'f') return `Z`;
    if (left === 'o') return `L 0 ${CY+NW} C ${-D} ${CY+NW} ${-D} ${CY-NW} 0 ${CY-NW} Z`;
    return                   `L 0 ${CY+NW} C ${D}  ${CY+NW} ${D}  ${CY-NW} 0 ${CY-NW} Z`;
  };

  return `M 0 0 ${topEdge()}${rightEdge()}${botEdge()}${leftEdge()}`;
}

function applyPuzzleShapes() {
  const pieces = document.querySelectorAll('.piece[data-idx]');

  // Phase 1 — batch all DOM reads (no writes yet)
  const data = Array.from(pieces).map(piece => ({
    piece,
    i: parseInt(piece.dataset.idx, 10),
    W: piece.offsetWidth,
    H: piece.offsetHeight,
    isDone: piece.classList.contains('piece--done'),
  }));

  // Phase 2 — batch all DOM writes
  data.forEach(({ piece, i, W, H, isDone }) => {
    if (!W || !H) return;
    const nubs    = PIECE_NUBS[i] || ['f','f','f','f'];
    const color   = PIECES[i]?.color || '#2563EB';
    const strokeW = isDone ? 2.5 : 1.8;
    const pathStr = buildPath(W, H, nubs);

    let svg = piece.querySelector('.piece__bg');
    if (!svg) {
      svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.classList.add('piece__bg');
      piece.prepend(svg);
    }
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('overflow', 'visible');
    svg.innerHTML =
      `<path d="${pathStr}" fill="#111D35" stroke="${color}" stroke-width="${strokeW}" stroke-linejoin="round" stroke-linecap="round"/>` +
      `<rect x="0" y="0" width="${W}" height="4" fill="${color}" rx="2"/>`;
  });
}

// Reapply on resize so nub positions stay correct
window.addEventListener('resize', () => requestAnimationFrame(applyPuzzleShapes));

function unlock(id) {
  unlocked.add(id);
  updateProgress();
  renderPieces();

  spawnConfetti(PIECES.find(p => p.id === id).color);

  if (unlocked.size === PIECES.length) {
    setTimeout(() => {
      const rc = document.getElementById('robotComplete');
      rc.classList.add('show');
      rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
      startTypewriter(
        'Wauw, geweldig gedaan! 🎉 Je snapt nu hoe AI écht werkt — van data verzamelen op het internet, patronen leren, een taalmodel trainen, antwoorden voorspellen, tot een AI Agent die zelfstandig handelt. Dat weten veel volwassenen nog niet! Misschien word jij wel de AI-expert van jouw klas. 🚀',
        document.getElementById('robotText'),
        document.getElementById('robotCursor'),
        28
      );
    }, 700);
  }
}

function startTypewriter(text, el, cursor, speed) {
  el.textContent = '';
  cursor.style.display = 'inline-block';
  let i = 0;
  const tick = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) {
      clearInterval(tick);
      setTimeout(() => cursor.style.display = 'none', 1200);
    }
  }, speed);
}

function updateProgress() {
  const total = PIECES.length;
  const done  = unlocked.size;
  const pct   = Math.round((done / total) * 100);
  document.getElementById('progressText').textContent = `${done} van ${total} stukjes ontgrendeld`;
  document.getElementById('progressPct').textContent  = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function resetAll() {
  unlocked.clear();
  updateProgress();
  renderPieces();
  document.getElementById('robotComplete').classList.remove('show');
  document.getElementById('robotText').textContent = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// CONFETTI
function spawnConfetti(color) {
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed;
      left:${Math.random()*100}vw;
      top:${Math.random()*40 + 20}vh;
      width:${Math.random()*8+6}px;
      height:${Math.random()*8+6}px;
      background:${color};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      pointer-events:none;
      z-index:9999;
      opacity:0.9;
      animation: confFall ${Math.random()*1+0.8}s ease-out forwards;
      animation-delay:${Math.random()*0.3}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

// Add confetti keyframe dynamically
const confStyle = document.createElement('style');
confStyle.textContent = `
  @keyframes confFall {
    0%   { transform: translateY(0) rotate(0deg); opacity:0.9; }
    100% { transform: translateY(120px) rotate(${Math.random()*360}deg); opacity:0; }
  }
`;
document.head.appendChild(confStyle);

// FLOATING BG DECORATIONS
function initFloaters() {
  const colors = ['#F59E0B','#7C3AED','#2563EB','#10B981','#FF6B6B','#0EA5E9'];
  const wrap = document.getElementById('floaters');
  for (let i = 0; i < 14; i++) {
    const c = colors[i % colors.length];
    const size = Math.random() * 40 + 20;
    const el = document.createElement('div');
    el.className = 'floater';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      top:${Math.random()*100}vh;
      width:${size}px; height:${size}px;
      animation-duration:${Math.random()*20+15}s;
      animation-delay:-${Math.random()*20}s;
    `;
    el.innerHTML = Math.random() > 0.5
      ? puzzleIcon(c, size)
      : `<svg width="${size}" height="${size}" viewBox="0 0 1 1"><circle cx=".5" cy=".5" r=".5" fill="${c}"/></svg>`;
    wrap.appendChild(el);
  }
}

initFloaters();
renderPieces();
updateProgress();

</script>
